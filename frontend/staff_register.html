<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar wajah staf — Sistem Manajemen Dapur MBG by DJATI CORP</title>
    <script src="js/brand.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="staff-page">
    <div class="min-h-screen" style="background: linear-gradient(135deg,#0B1220 0%,#0F172A 100%); display: flex; align-items: center; justify-content: center; padding: 1rem;">
        <div class="login-container" style="max-width: 550px; width: 100%;">
            <div class="login-right" style="border-radius: var(--radius-lg);">
                <div id="staff-face-register">
                    <div style="margin-bottom:1.5rem;">
                        <button class="btn btn-secondary btn-xs mb-3" onclick="window.location.href='staff.html'"><i class="fas fa-arrow-left"></i> Kembali</button>
                        <h2 style="font-size:1.5rem;font-weight:700;color:var(--text-main);letter-spacing:-0.02em;margin-bottom:0.375rem;">Daftar Wajah Baru</h2>
                        <p style="font-size:0.875rem;color:var(--text-muted);">Verifikasi identitas dan ambil foto untuk pendaftaran otomatis.</p>
                    </div>
                    <div class="card mb-4" style="background: var(--bg-card-soft);">
                        <div class="form-grid">
                            <div class="form-full">
                                <label class="input-label">Kode dapur / kitchen</label>
                                <input id="reg_tenant" class="input-field" placeholder="Sesuai arahan pengelola dapur" />
                            </div>
                            <div class="form-full">
                                <label class="input-label">Nama Lengkap</label>
                                <input id="reg_name" class="input-field" placeholder="Nama lengkap Anda" />
                            </div>
                            <div>
                                <label class="input-label">Divisi / Unit</label>
                                <select id="reg_division" class="input-field">
                                    <option value="">Pilih divisi...</option>
                                    <option value="SPPG">SPPG</option>
                                    <option value="PENGEMASAN">PENGEMASAN</option>
                                    <option value="DISTRIBUSI">DISTRIBUSI</option>
                                    <option value="ADMINISTRASI">ADMINISTRASI</option>
                                    <option value="LAINNYA">LAINNYA</option>
                                </select>
                            </div>
                            <div>
                                <label class="input-label">PIN Tenant</label>
                                <input id="reg_pin" type="text" class="input-field" placeholder="PIN dari Manajemen" />
                            </div>
                        </div>
                    </div>
                        <div style="position:relative; border-radius:var(--radius); overflow:hidden; border:2px solid var(--border); background:#000; margin: 0 auto; max-width: 460px;">
                            <video id="reg_video" class="w-full" style="min-height:320px; transform: scaleX(-1);" playsinline autoplay muted></video>
                            <div style="position:absolute; top:50%; left:50%; width:340px; height:340px; margin-left:-170px; margin-top:-170px; border:3px dashed var(--secondary); border-radius:50%; pointer-events:none; box-shadow: 0 0 0 9999px rgba(0,0,0,0.5);"></div>
                        </div>
                        <div class="flex gap-2 mt-3">
                            <button class="btn btn-primary flex-1" onclick="submitFaceRegistration()"><i class="fas fa-camera"></i> Ambil &amp; Daftar</button>
                        </div>
                    </div>
                    <div id="reg_face_error" class="field-error p-3 hidden"></div>
                </div>
            </div>
        </div>
    </div>
    <div id="toast-area" class="toast-area"></div>
    <!-- Modal Components -->
    <div id="modal-overlay" class="modal-overlay" style="display: none;">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modal-title" class="modal-title"></h3>
                <button class="btn btn-secondary btn-sm" onclick="closeModalUi()"><i class="fas fa-times"></i></button>
            </div>
            <div id="modal-body" class="modal-body"></div>
            <div id="modal-error" class="field-error p-3 hidden mb-3"></div>
            <div id="modal-actions" class="modal-actions"></div>
        </div>
    </div>

    <script src='js/core.js?v=30'></script>
    <script src='js/staff_attendance.js?v=33'></script>
    <script>
        window.addEventListener('load', () => {
             if (typeof startCamera === 'function') {
                startCamera('reg_video');
            }
            if (typeof loadDivisions === 'function') {
                loadDivisions('reg_division');
            }
            
            // Reload divisions when tenant changes
            const tenantInput = document.getElementById('reg_tenant');
            if (tenantInput) {
                tenantInput.addEventListener('change', () => loadDivisions('reg_division'));
                tenantInput.addEventListener('blur', () => loadDivisions('reg_division'));
            }
            
            const pinInput = document.getElementById('reg_pin');
            if (pinInput) {
                pinInput.addEventListener('change', () => { if (typeof saveRegPin === 'function') saveRegPin(); });
                pinInput.addEventListener('blur', () => { if (typeof saveRegPin === 'function') saveRegPin(); });
            }
        });
    </script>
</body>
</html>
