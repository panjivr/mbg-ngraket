{% extends "base.html" %}

{% block title %}Reset Kata Sandi · MBG{% endblock %}

{% block content %}
  <div class="auth">
    <div class="card auth-card">
      <h1 class="h2">Reset Kata Sandi</h1>
      <p class="muted">Masukkan kata sandi baru Anda.</p>

      {% if error.is_some() %}
        <div class="alert alert-danger">{{ error.as_ref().unwrap() }}</div>
      {% endif %}

      <form method="post" action="/reset-password" class="form">
        <input type="hidden" name="token" value="{{ token }}" />
        
        <label class="label" for="password">Kata Sandi Baru</label>
        <div class="password-wrapper">
          <input class="input" id="password" name="password" type="password" autocomplete="new-password" required />
          <button type="button" class="password-toggle" onclick="togglePassword(this)" aria-label="Tampilkan kata sandi">
            <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
          </button>
        </div>

        <label class="label" for="confirm_password">Konfirmasi Kata Sandi Baru</label>
        <div class="password-wrapper">
          <input class="input" id="confirm_password" name="confirm_password" type="password" autocomplete="new-password" required />
          <button type="button" class="password-toggle" onclick="togglePassword(this)" aria-label="Tampilkan kata sandi">
            <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
          </button>
        </div>

        <div class="row" style="margin-top: 20px;">
          <button class="btn btn-primary" type="submit">Ubah Kata Sandi</button>
        </div>
      </form>
    </div>
  </div>
{% endblock %}
