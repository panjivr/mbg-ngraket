<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <link rel="stylesheet" href="/assets/app.css" />
    <script src="/assets/app.js" defer></script>
    <title>{% block title %}Manajemen Dapur MBG{% endblock %}</title>
    <style>
      .password-wrapper { position: relative; width: 100%; }
      .password-toggle {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        cursor: pointer;
        padding: 4px;
        color: var(--muted);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10;
      }
      .password-toggle:hover { color: var(--text); }
      .password-toggle svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; }
    </style>
    <script>
      function togglePassword(btn) {
        const input = btn.parentElement.querySelector('input');
        const isPassword = input.type === 'password';
        input.type = isPassword ? 'text' : 'password';
        
        // Toggle icon (Eye vs Eye-Off)
        if (isPassword) {
          btn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>`;
        } else {
          btn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>`;
        }
      }
    </script>
    {% block head %}{% endblock %}
  </head>
  <body>
    <header class="topbar">
      <div class="container topbar-inner">
        <a class="brand" href="/">
          <span class="brand-dot"></span>
          <span class="brand-name">Manajemen Dapur MBG</span>
        </a>
        <nav class="topnav">
          {% block topnav %}{% endblock %}
        </nav>
      </div>
    </header>
    <main class="container main">
      {% block content %}{% endblock %}
    </main>
    <footer class="container footer">
      <div class="muted">© DJATI CORP — Sistem Manajemen Dapur MBG</div>
    </footer>
  </body>
</html>
